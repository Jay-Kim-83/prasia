<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>프라시아 전기 — 랭킹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c14;--bg2:#0d1525;--bg3:#111e35;
  --border:#1e3358;--border-glow:#2a4f8a;
  --gold:#c9a227;--gold-light:#f0cc6a;--gold-dim:#7a601a;
  --cyan:#4fc3f7;--cyan-dim:#1a5f7a;
  --text:#d4e3ff;--text-dim:#7a95bf;--text-faint:#3a5070;
  --green:#66bb6a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(42,79,138,.15) 0%,transparent 70%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:0 24px 60px}

header{padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(201,162,39,.3);flex-shrink:0}
.logo-text h1{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--gold-light);letter-spacing:.05em;line-height:1.1}
.logo-text span{font-size:11px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
.made-by{display:inline-block;margin-left:4px;font-size:10px;letter-spacing:.05em;text-transform:none;color:var(--text-faint);background:linear-gradient(90deg,var(--gold-dim),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:.7;transition:opacity .3s}
.made-by:hover{opacity:1}
.made-by strong{font-weight:700;color:var(--gold-light)}
.header-right{display:flex;align-items:center;gap:12px}
.status-badge{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--text-dim)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.status-dot.offline{background:var(--text-faint);box-shadow:none;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-admin{background:transparent;border:1px solid var(--border-glow);color:var(--cyan);padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;text-decoration:none}
.btn-admin:hover{background:var(--cyan-dim);border-color:var(--cyan)}

.filters-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px}
.filters-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;font-weight:500}
.fg select,.fg input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-family:inherit;font-size:13px;outline:none;transition:border-color .2s;height:34px}
.fg select{padding-right:26px;appearance:none;cursor:pointer}
.fg select option{background:var(--bg2)}
.fg select:focus,.fg input:focus{border-color:var(--border-glow)}
.fg select:disabled{opacity:.4;cursor:not-allowed}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;font-size:11px}
.fg.search{flex:1;min-width:180px}
.fg.search input{width:100%;padding-left:32px}
.search-wrap{position:relative}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:13px}
.btn-reset{height:34px;padding:0 14px;background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .2s;align-self:flex-end;white-space:nowrap}
.btn-reset:hover{border-color:var(--border-glow);color:var(--text)}

/* realm stats */
.realm-stats{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center;font-size:12px;color:var(--text-dim)}
.realm-stats .rs-title{font-weight:600;color:var(--gold);font-size:13px;margin-right:4px}
.realm-stats .rs-item{display:inline-flex;align-items:center;gap:4px}
.realm-stats .rs-num{font-weight:700;color:var(--text)}
.realm-stats .rs-grade{padding:1px 6px;border-radius:10px;font-size:11px;font-weight:600}

.stats-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.result-count{font-size:13px;color:var(--text-dim)}
.result-count strong{color:var(--gold)}
.sort-wrap{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim)}
.sort-wrap .sel-wrap select{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:4px 22px 4px 8px;border-radius:5px;font-family:inherit;font-size:12px;outline:none;appearance:none;cursor:pointer;height:30px}

/* ── TABLE: fixed layout ── */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
col.c-rank  {width:60px}
col.c-nick  {width:auto}   /* flex remaining */
col.c-tags  {width:0;overflow:hidden;padding:0}  /* hidden on desktop */
col.c-job   {width:130px}
col.c-level {width:80px}
col.c-world {width:110px}
col.c-realm {width:120px}
col.c-grade {width:120px}

/* 모바일 합쳐진 태그 열: 데스크탑에서 숨김 */
.td-tags{display:none}
.td-tags .level-val{font-size:12px;padding:2px 7px;background:var(--bg3);border:1px solid var(--border);border-radius:4px}

thead tr{background:linear-gradient(90deg,#0d1c35,#0a1628);border-bottom:1px solid var(--border-glow)}
thead th{padding:11px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;overflow:hidden}
tbody tr{border-bottom:1px solid rgba(30,51,88,.5);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(42,79,138,.12)}
tbody td{padding:12px 14px;vertical-align:middle;overflow:hidden}

/* rank */
.td-rank{text-align:center}
.rank-num{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--text-dim)}
.rank-1 .rank-num{background:linear-gradient(135deg,#ffd700,#ffaa00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rank-2 .rank-num{background:linear-gradient(135deg,#c0c0c0,#e8e8e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rank-3 .rank-num{background:linear-gradient(135deg,#cd7f32,#e8a060);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.crown{font-size:18px}

/* nick */
.nick-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.guild-name{font-size:11px;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.guild-name::before{content:'⚔ '}

/* job */
.job-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid transparent;white-space:nowrap}
.job-환영검사{background:rgba(239,83,80,.12);border-color:rgba(239,83,80,.35);color:#ef9a9a}
.job-주문각인사{background:rgba(171,71,188,.12);border-color:rgba(171,71,188,.35);color:#ce93d8}
.job-집행관{background:rgba(255,167,38,.12);border-color:rgba(255,167,38,.35);color:#ffcc80}
.job-향사수{background:rgba(102,187,106,.12);border-color:rgba(102,187,106,.35);color:#a5d6a7}
.job-강령술사{background:rgba(38,166,154,.12);border-color:rgba(38,166,154,.35);color:#80cbc4}
.job-태양감시자{background:rgba(255,200,0,.12);border-color:rgba(255,200,0,.35);color:#ffe066}
.job-심연추방자{background:rgba(63,81,181,.12);border-color:rgba(63,81,181,.35);color:#9fa8da}
.job-야만투사{background:rgba(255,112,67,.12);border-color:rgba(255,112,67,.35);color:#ffab91}

/* level */
.level-val{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--cyan)}

/* world / realm */
.world-badge,.realm-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:12px;white-space:nowrap}
.world-badge{background:var(--bg3);border:1px solid var(--border);color:var(--text-dim)}
.realm-badge{background:rgba(42,79,138,.15);border:1px solid var(--border-glow);color:#93c5fd}
/* 동적 월드 컬러는 JS에서 style로 적용 */

/* conquest grade */
.cq{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.cq-신화{background:rgba(255,100,30,.15);border:1px solid rgba(255,100,30,.5);color:#ff9966}
.cq-전설{background:rgba(234,179,8,.12);border:1px solid rgba(234,179,8,.4);color:#fde047}
.cq-영웅{background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.4);color:#d8b4fe}
.cq-희귀{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.4);color:#93c5fd}
.cq-일반{background:var(--bg3);border:1px solid var(--border);color:var(--text-dim)}

/* empty / pagination */
.empty-state{padding:70px 20px;text-align:center;color:var(--text-dim)}
.empty-state .icon{font-size:44px;margin-bottom:14px;opacity:.4}
.empty-state h3{font-size:15px;margin-bottom:6px}
.pagination{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:18px;flex-wrap:wrap}
.page-btn{min-width:34px;height:34px;padding:0 9px;background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);border-radius:6px;font-family:inherit;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.page-btn:hover:not(:disabled){border-color:var(--border-glow);color:var(--text)}
.page-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light);font-weight:600}
.page-btn:disabled{opacity:.3;cursor:default}
.page-ellipsis{color:var(--text-faint);padding:0 3px}

.sample-banner{background:rgba(255,167,38,.1);border:1px solid rgba(255,167,38,.3);border-radius:8px;padding:9px 14px;margin-bottom:14px;font-size:12px;color:#ffcc80;display:flex;align-items:center;gap:8px}
.sample-banner.hidden,.hidden{display:none!important}
#toast{position:fixed;bottom:22px;right:22px;background:var(--bg3);border:1px solid var(--border-glow);color:var(--text);padding:11px 16px;border-radius:8px;font-size:13px;z-index:100;opacity:0;transform:translateY(10px);transition:all .25s;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateY(0)}

/* ── RESPONSIVE: TABLET ── */
@media(max-width:900px){
  col.c-world,col.c-realm,.col-world,.col-realm{display:none}
}

/* ── RESPONSIVE: MOBILE ── */
@media(max-width:600px){
  .wrap{padding:0 12px 40px}
  header{padding:18px 0 14px;margin-bottom:14px;flex-direction:column;align-items:flex-start;gap:10px}
  .header-right{width:100%;justify-content:space-between}
  .logo-text h1{font-size:17px}

  /* 필터: 2열 그리드 */
  .filters-section{padding:12px 14px;margin-bottom:12px;border-radius:8px}
  .filters-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .fg select,.fg input{font-size:16px;height:40px;padding:8px 12px}
  .fg.search{grid-column:1/-1}
  .fg.search input{padding-left:34px}
  .btn-reset{height:40px;grid-column:1/-1}
  .stats-bar{margin-bottom:8px}
  .realm-stats{padding:10px 12px;font-size:11px;gap:6px 12px;border-radius:8px}

  /* 테이블 → 카드 레이아웃 */
  .table-wrap{background:transparent;border:none;border-radius:0;overflow:visible}
  table,thead,tbody{display:block}
  thead{display:none}
  colgroup{display:none}
  tbody tr{display:grid;grid-template-columns:44px 1fr;grid-template-rows:auto auto;gap:4px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;padding:14px;align-items:center}
  tbody tr:hover{background:var(--bg2)}
  tbody td{padding:0;overflow:visible}

  /* 순위: 왼쪽 전체 행 차지 */
  tbody td.td-rank{grid-row:1/3;grid-column:1;display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:var(--bg3);border-radius:8px}
  .rank-num{font-size:16px}
  .crown{font-size:22px}

  /* 닉네임: 오른쪽 1행 */
  tbody td:nth-child(2){grid-row:1;grid-column:2;display:block}
  .nick-name{font-size:15px;white-space:normal}

  /* 합쳐진 태그(직업+레벨+등급): 오른쪽 2행 */
  tbody td.td-tags{display:flex!important;flex-wrap:wrap;gap:6px;align-items:center;grid-row:2;grid-column:2}

  /* 개별 직업/레벨/등급 열: 모바일에서 숨김 */
  tbody td.td-job-only,tbody td.td-level-only,tbody td.td-grade-only{display:none!important}

  /* 월드/렐름 숨기기 */
  td.col-world,td.col-realm{display:none!important}

  /* 페이지네이션 터치 친화적 */
  .page-btn{min-width:40px;height:40px;font-size:14px}
  .pagination{gap:4px;margin-top:14px}

  #toast{bottom:12px;right:12px;left:12px;text-align:center}
}
</style>
</head>
<body>

<!-- 로그인 오버레이 -->
<div id="loginOverlay" style="position:fixed;inset:0;background:rgba(8,12,20,.97);display:none;align-items:center;justify-content:center;z-index:999">
  <div style="background:var(--bg2);border:1px solid var(--border-glow);border-radius:16px;padding:40px 36px;width:100%;max-width:360px;text-align:center">
    <div style="font-size:40px;margin-bottom:16px">⚔</div>
    <h2 style="font-family:'Cinzel',serif;color:var(--gold-light);font-size:18px;margin-bottom:6px">Prasia Records</h2>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:24px">로그인이 필요합니다</p>
    <input type="text" id="loginId" placeholder="아이디" style="width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-family:inherit;font-size:14px;outline:none;margin-bottom:10px" onkeydown="if(event.key==='Enter')document.getElementById('loginPw').focus()">
    <input type="password" id="loginPw" placeholder="비밀번호" style="width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-family:inherit;font-size:14px;outline:none;margin-bottom:10px" onkeydown="if(event.key==='Enter')doUserLogin()">
    <div id="loginError" style="font-size:12px;color:#ef9a9a;margin-bottom:10px;min-height:18px"></div>
    <button onclick="doUserLogin()" style="width:100%;background:linear-gradient(135deg,var(--gold-dim),#9b7d25);border:1px solid var(--gold);color:var(--gold-light);padding:11px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer">로그인</button>
  </div>
</div>

<div class="wrap">

<header>
  <div class="logo">
    <div class="logo-icon">⚔</div>
    <div class="logo-text">
      <h1>Prasia Records</h1>
      <span>프라시아 전기 랭킹</span>
      <span class="made-by">Made by <strong>두껍</strong></span>
    </div>
  </div>
  <div class="header-right">
    <div class="status-badge">
      <span class="status-dot offline" id="statusDot"></span>
      <span id="statusText">불러오는 중...</span>
    </div>
    <a href="/admin.html" class="btn-admin">⚙ 관리</a>
  </div>
</header>

<div class="sample-banner hidden" id="sampleBanner">
  ⚠ 샘플 데이터입니다. 관리 페이지에서 실제 데이터를 수집해 주세요.
</div>

<div class="filters-section">
  <div class="filters-row">
    <div class="fg">
      <label>월드</label>
      <div class="sel-wrap"><select id="fWorld"><option value="">전체</option></select></div>
    </div>
    <div class="fg">
      <label>렐름</label>
      <div class="sel-wrap"><select id="fRealm" disabled><option value="">전체</option></select></div>
    </div>
    <div class="fg">
      <label>직업</label>
      <div class="sel-wrap"><select id="fJob"><option value="">전체</option></select></div>
    </div>
    <div class="fg">
      <label>토벌등급</label>
      <div class="sel-wrap"><select id="fGrade"><option value="">전체</option></select></div>
    </div>
    <div class="fg">
      <label>레벨</label>
      <div class="sel-wrap"><select id="fLevel"><option value="">전체</option></select></div>
    </div>
    <div class="fg search">
      <label>닉네임 / 결사명</label>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="fSearch" placeholder="닉네임 또는 결사명 검색...">
      </div>
    </div>
    <button class="btn-reset" onclick="resetFilters()">↺ 초기화</button>
  </div>
</div>

<div class="realm-stats hidden" id="realmStats"></div>

<div class="stats-bar">
  <div class="result-count" id="resultCount">캐릭터 <strong>0</strong>명</div>
  <div class="sort-wrap">
    정렬:
    <div class="sel-wrap">
      <select id="sortBy" onchange="applyFilters()">
        <option value="rank">랭킹순</option>
        <option value="level_desc" selected>레벨 높은순</option>
        <option value="level_asc">레벨 낮은순</option>
        <option value="nickname">닉네임순</option>
      </select>
    </div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <colgroup>
      <col class="c-rank">
      <col class="c-nick">
      <col class="c-tags">
      <col class="c-job">
      <col class="c-level">
      <col class="c-world col-world">
      <col class="c-realm col-realm">
      <col class="c-grade">
    </colgroup>
    <thead>
      <tr>
        <th class="td-rank">순위</th>
        <th>닉네임 / 결사명</th>
        <th class="td-tags"></th>
        <th>직업</th>
        <th>레벨</th>
        <th class="col-world">월드</th>
        <th class="col-realm">렐름</th>
        <th>토벌등급</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty-state hidden" id="emptyState">
    <div class="icon">🔮</div>
    <h3>검색 결과 없음</h3>
    <p>필터 조건을 변경해 보세요.</p>
  </div>
</div>

<div class="pagination" id="pagination"></div>
</div>
<div id="toast"></div>

<script>
const USER_TOKEN_KEY = 'prasia_user_token';
const ADMIN_TOKEN_KEY = 'prasia_admin_token';
let userToken = localStorage.getItem(USER_TOKEN_KEY) || localStorage.getItem(ADMIN_TOKEN_KEY) || '';

function authHeaders() { return userToken ? { 'X-User-Token': userToken } : {}; }
function authFetch(url, opts = {}) {
  opts.headers = { ...opts.headers, ...authHeaders() };
  return fetch(url, opts);
}

async function checkLogin() {
  const overlay = document.getElementById('loginOverlay');
  try {
    const res = await fetch('/api/user/check', { headers: authHeaders() });
    const data = await res.json();
    if (data.loggedIn) {
      overlay.style.display = 'none';
      init();
    } else {
      overlay.style.display = 'flex';
    }
  } catch {
    // 서버 연결 실패 시 일단 표시
    overlay.style.display = 'flex';
  }
}

async function doUserLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginError');
  if (!id || !pw) { err.textContent = '아이디와 비밀번호를 입력하세요.'; return; }
  try {
    const res = await fetch('/api/user/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, password: pw })
    });
    const data = await res.json();
    if (data.success) {
      userToken = data.token;
      localStorage.setItem(USER_TOKEN_KEY, userToken);
      document.getElementById('loginOverlay').style.display = 'none';
      init();
    } else {
      err.textContent = data.message || '로그인 실패';
    }
  } catch { err.textContent = '서버 연결 실패'; }
}

const PER_PAGE    = 50;
// 토벌등급: 숫자 또는 텍스트 모두 지원
const GRADE_TEXT_TO_NUM = { '신화':24, '전설':20, '영웅':16, '희귀':12, '일반':1 };
function gradeNum(v) {
  if (typeof v === 'number') return v;
  const n = Number(v);
  if (!isNaN(n) && n > 0) return n;
  return GRADE_TEXT_TO_NUM[String(v)] || 0;
}
function gradeLabel(v) {
  const n = gradeNum(v);
  if (n >= 24) return '신화';
  if (n >= 20) return '전설';
  if (n >= 16) return '영웅';
  if (n >= 12) return '희귀';
  return '일반';
}
function gradeIcon(v) {
  return { 신화:'👑', 전설:'⚡', 영웅:'🌟', 희귀:'💎', 일반:'🛡' }[gradeLabel(v)] || '🛡';
}
function gradeCls(v) { return `cq cq-${gradeLabel(v)}`; }
function gradeDisplay(v) { const n = gradeNum(v); return n > 0 ? n : '-'; }

// 월드별 고유 색상 생성
const WORLD_COLORS = {};
let _worldHueIdx = 0;
const _HUES = [210,30,150,340,70,270,110,190,310,50,240,10,170,290,130,350,90,230,330,60,200,20,160,280,100];
function getWorldColor(world) {
  if (!world) return null;
  if (!WORLD_COLORS[world]) {
    const hue = _HUES[_worldHueIdx % _HUES.length];
    _worldHueIdx++;
    WORLD_COLORS[world] = { hue, sat: 60, light: 65 };
  }
  return WORLD_COLORS[world];
}
function worldStyle(world) {
  const c = getWorldColor(world);
  if (!c) return '';
  return `background:hsla(${c.hue},${c.sat}%,${c.light}%,.12);border-color:hsla(${c.hue},${c.sat}%,${c.light}%,.4);color:hsl(${c.hue},${c.sat}%,${c.light}%)`;
}
function realmStyle(world) {
  const c = getWorldColor(world);
  if (!c) return '';
  // 렐름은 같은 hue에서 살짝 밝고 채도 낮게
  return `background:hsla(${c.hue},${c.sat-10}%,${c.light+10}%,.1);border-color:hsla(${c.hue},${c.sat-10}%,${c.light}%,.3);color:hsl(${c.hue},${c.sat-10}%,${c.light+10}%)`;
}
const JOB_ICONS   = { 환영검사:'⚔', 주문각인사:'📖', 집행관:'🛡', 향사수:'🏹', 강령술사:'💀', 태양감시자:'☀', 심연추방자:'🌑', 야만투사:'🪓' };

let allData = [];
let worldRealmMap = {};  // { '론도': ['론도 01', ...] }
let filtered  = [];
let currentPage = 1;

// ── INIT ─────────────────────────────────────────────────────────
async function init() {
  try {
    const [dRes, sRes] = await Promise.all([authFetch('/api/data'), authFetch('/api/status')]);
    const data   = await dRes.json();
    const status = await sRes.json();
    allData = (data.characters || []).map((c, i) => ({ ...c, rank: c.rank || i + 1 }));

    if (status.isSample) document.getElementById('sampleBanner').classList.remove('hidden');

    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    if (status.lastUpdated) {
      dot.classList.remove('offline');
      const d = new Date(status.lastUpdated);
      txt.textContent = `${d.toLocaleDateString('ko-KR')} ${d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})} 수집`;
    } else {
      txt.textContent = '데이터 없음';
    }

    buildMaps();
    buildFilters();
    applyFilters();
  } catch(e) {
    document.getElementById('statusText').textContent = '서버 연결 실패';
  }
}

// ── MAPS ─────────────────────────────────────────────────────────
function buildMaps() {
  worldRealmMap = {};
  allData.forEach(c => {
    if (!c.world) return;
    if (!worldRealmMap[c.world]) worldRealmMap[c.world] = new Set();
    if (c.realm) worldRealmMap[c.world].add(c.realm);
  });
  // 월드별 색상 미리 할당 (정렬 순서 기준)
  Object.keys(worldRealmMap).sort(naturalSort).forEach(w => getWorldColor(w));
}

// ── BUILD FILTERS ────────────────────────────────────────────────
function buildFilters() {
  const worlds = Object.keys(worldRealmMap).sort(naturalSort);
  populate('fWorld', worlds);

  const jobs = [...new Set(allData.map(c => c.job).filter(Boolean))].sort();
  populate('fJob', jobs);

  const gradeSet = new Map();
  allData.forEach(c => {
    const n = gradeNum(c.conquestGrade);
    if (n > 0) gradeSet.set(n, gradeLabel(n));
  });
  const grades = [...gradeSet.entries()].sort((a,b) => b[0] - a[0]);
  const gradeSel = document.getElementById('fGrade');
  grades.forEach(([n, label]) => {
    const o = document.createElement('option');
    o.value = n; o.textContent = `${n} (${label})`;
    gradeSel.appendChild(o);
  });

  buildLevelSelect();

  // ★ Fix 1: fRealm에도 change 이벤트 등록
  document.getElementById('fWorld').addEventListener('change', onWorldChange);
  document.getElementById('fRealm').addEventListener('change', applyFilters);
  ['fJob','fGrade','fLevel'].forEach(id =>
    document.getElementById(id).addEventListener('change', applyFilters)
  );
  document.getElementById('fSearch').addEventListener('input', applyFilters);
}

function buildLevelSelect() {
  const levels = allData.map(c => c.level).filter(n => n > 0);
  if (!levels.length) return;
  const minLv = Math.min(...levels), maxLv = Math.max(...levels);
  const range = maxLv - minLv;
  const step  = range <= 20 ? 1 : range <= 50 ? 5 : 10;

  const bands = new Set();
  levels.forEach(lv => bands.add(Math.floor(lv / step) * step));
  const sorted = [...bands].sort((a,b) => b - a);

  const sel = document.getElementById('fLevel');
  sorted.forEach(band => {
    const lo = band, hi = band + step - 1;
    const o  = document.createElement('option');
    o.value  = `${lo}:${hi}`;
    o.textContent = step === 1 ? `${lo}` : `${lo} ~ ${hi}`;
    sel.appendChild(o);
  });
}

function populate(id, items) {
  const sel = document.getElementById(id);
  items.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    sel.appendChild(o);
  });
}

function naturalSort(a, b) {
  return a.localeCompare(b, 'ko', { numeric:true });
}

// ── WORLD → REALM CASCADE ────────────────────────────────────────
function onWorldChange() {
  const world = document.getElementById('fWorld').value;
  const rs    = document.getElementById('fRealm');
  rs.innerHTML = '<option value="">전체</option>';

  if (world && worldRealmMap[world]) {
    const realms = [...worldRealmMap[world]].sort(naturalSort);
    realms.forEach(r => {
      const o = document.createElement('option');
      o.value = r; o.textContent = r;
      rs.appendChild(o);
    });
    rs.disabled = false;
  } else {
    rs.disabled = true;
  }
  applyFilters();
}

// ── APPLY FILTERS & SORT ─────────────────────────────────────────
function applyFilters() {
  const world  = document.getElementById('fWorld').value;
  const realm  = document.getElementById('fRealm').value;
  const job    = document.getElementById('fJob').value;
  const grade  = document.getElementById('fGrade').value;
  const lvBand = document.getElementById('fLevel').value;
  const q      = document.getElementById('fSearch').value.trim().toLowerCase();
  const sortBy = document.getElementById('sortBy').value;

  let lvMin = 0, lvMax = 9999;
  if (lvBand) { const [lo,hi] = lvBand.split(':').map(Number); lvMin=lo; lvMax=hi; }

  filtered = allData.filter(c =>
    (!world || c.world === world) &&
    (!realm || c.realm === realm) &&
    (!job   || c.job   === job)   &&
    (!grade || gradeNum(c.conquestGrade) === Number(grade)) &&
    (c.level >= lvMin && c.level <= lvMax) &&
    (!q || c.nickname?.toLowerCase().includes(q) || c.guild?.toLowerCase().includes(q))
  );

  filtered.sort((a,b) => {
    if (sortBy==='level_desc') return (b.level||0)-(a.level||0);
    if (sortBy==='level_asc')  return (a.level||0)-(b.level||0);
    if (sortBy==='nickname')   return (a.nickname||'').localeCompare(b.nickname||'','ko');
    return (a.rank||0)-(b.rank||0);
  });

  updateRealmStats(world, realm);

  currentPage = 1;
  renderTable();
}

// ── RENDER ───────────────────────────────────────────────────────
function renderTable() {
  const total = filtered.length;
  document.getElementById('resultCount').innerHTML =
    `캐릭터 <strong>${total.toLocaleString()}</strong>명`;

  const page  = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');

  if (!page.length) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  empty.classList.add('hidden');
  tbody.innerHTML = page.map(renderRow).join('');
  renderPagination(total);
}

function renderRow(c) {
  const r      = c.rank;
  const crown  = {1:'🥇',2:'🥈',3:'🥉'}[r];
  const rankHtml = crown ? `<span class="crown">${crown}</span>` : `<span class="rank-num">${r}</span>`;
  const jobIcon  = JOB_ICONS[c.job] || '⚔';
  const gv = c.conquestGrade;
  const gd = gradeDisplay(gv);
  const gi = gradeIcon(gv);
  const gc = gradeCls(gv);
  return `<tr>
    <td class="td-rank rank-${r<=3?r:''}">${rankHtml}</td>
    <td>
      <div class="nick-name">${esc(c.nickname)}</div>
      ${c.guild?`<div class="guild-name">${esc(c.guild)}</div>`:''}
    </td>
    <td class="td-tags">
      <span class="job-badge job-${esc(c.job)}">${jobIcon} ${esc(c.job)}</span>
      <span class="level-val">Lv.${c.level}</span>
      <span class="${gc}">${gi} ${gd}</span>
    </td>
    <td class="td-job-only"><span class="job-badge job-${esc(c.job)}">${jobIcon} ${esc(c.job)}</span></td>
    <td class="td-level-only"><span class="level-val">${c.level}</span></td>
    <td class="col-world"><span class="world-badge" style="${worldStyle(c.world)}">${esc(c.world)}</span></td>
    <td class="col-realm"><span class="realm-badge" style="${realmStyle(c.world)}">${esc(c.realm||'-')}</span></td>
    <td class="td-grade-only"><span class="${gc}">${gi} ${gd}</span></td>
  </tr>`;
}

function renderPagination(total) {
  const tp = Math.ceil(total/PER_PAGE);
  if (tp<=1) { document.getElementById('pagination').innerHTML=''; return; }
  const range = 2;
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i=1; i<=tp; i++) {
    if (i===1||i===tp||(i>=currentPage-range&&i<=currentPage+range))
      html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    else if (i===currentPage-range-1||i===currentPage+range+1)
      html+=`<span class="page-ellipsis">…</span>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===tp?'disabled':''}>›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  const tp = Math.ceil(filtered.length/PER_PAGE);
  if (p<1||p>tp) return;
  currentPage=p; renderTable();
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetFilters() {
  ['fWorld','fJob','fGrade','fLevel'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('sortBy').value='level_desc';
  const rs=document.getElementById('fRealm');
  rs.innerHTML='<option value="">전체</option>'; rs.disabled=true;
  document.getElementById('fSearch').value='';
  applyFilters();
}

// ── REALM STATS ─────────────────────────────────────────────────
function updateRealmStats(world, realm) {
  const el = document.getElementById('realmStats');
  if (!world && !realm) { el.classList.add('hidden'); return; }

  // 해당 월드/렐름의 전체 데이터 (필터 무관)
  const pool = allData.filter(c =>
    (!world || c.world === world) &&
    (!realm || c.realm === realm)
  );

  const lv90 = pool.filter(c => c.level >= 90).length;

  // 토벌등급별 인원수 (숫자 기준, 높은순)
  const gradeCounts = {};
  pool.forEach(c => {
    const g = gradeNum(c.conquestGrade);
    if (g > 0) gradeCounts[g] = (gradeCounts[g] || 0) + 1;
  });
  const gradeKeys = Object.keys(gradeCounts).map(Number).sort((a,b) => b - a);

  const label = realm || world;
  let html = `<span class="rs-title">${esc(label)}</span>`;
  html += `<span class="rs-item">Lv.90+ <span class="rs-num">${lv90}</span>명</span>`;
  html += '<span style="color:var(--border-glow)">│</span>';
  gradeKeys.forEach(g => {
    const cls = gradeCls(g);
    html += `<span class="rs-item"><span class="rs-grade ${cls}">${gradeIcon(g)} ${g}</span> <span class="rs-num">${gradeCounts[g]}</span>명</span>`;
  });

  el.innerHTML = html;
  el.classList.remove('hidden');
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

checkLogin();
</script>

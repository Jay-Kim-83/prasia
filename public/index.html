<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>프라시아 전기 — 랭킹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root,:root[data-theme="dark"]{
  --bg:#080c14;--bg2:#0d1525;--bg3:#111e35;
  --border:#1e3358;--border-glow:#2a4f8a;
  --gold:#c9a227;--gold-light:#f0cc6a;--gold-dim:#7a601a;
  --cyan:#4fc3f7;--cyan-dim:#1a5f7a;
  --text:#d4e3ff;--text-dim:#7a95bf;--text-faint:#3a5070;
  --green:#66bb6a;
  --overlay-bg:rgba(8,12,20,.85);--hover-bg:rgba(42,79,138,.12);
  --shadow:rgba(0,0,0,.5);--glow:rgba(42,79,138,.15);
  color-scheme:dark;
}
:root[data-theme="light"]{
  --bg:#f0f2f6;--bg2:#ffffff;--bg3:#e4e8f0;
  --border:#c8d0dc;--border-glow:#9aacc4;
  --gold:#9a7b18;--gold-light:#6b5510;--gold-dim:#d4b84a;
  --cyan:#0277b5;--cyan-dim:#b3dcf0;
  --text:#1a2030;--text-dim:#506078;--text-faint:#8898aa;
  --green:#2e7d32;
  --overlay-bg:rgba(0,0,0,.45);--hover-bg:rgba(100,140,200,.1);
  --shadow:rgba(0,0,0,.12);--glow:rgba(100,140,200,.08);
  color-scheme:light;
}
*{margin:0;padding:0;box-sizing:border-box}
/* 글로벌 스크롤바 */
*{scrollbar-width:thin;scrollbar-color:var(--border-glow) transparent}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-glow);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,var(--glow) 0%,transparent 70%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:0 24px 60px}

header{padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(201,162,39,.3);flex-shrink:0}
.logo-text h1{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--gold-light);letter-spacing:.05em;line-height:1.1}
.logo-text span{font-size:11px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
.made-by{display:inline-block;margin-left:4px;font-size:10px;letter-spacing:.05em;text-transform:none;color:var(--text-faint);background:linear-gradient(90deg,var(--gold-dim),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:.7;transition:opacity .3s}
.made-by:hover{opacity:1}
.made-by strong{font-weight:700;color:var(--gold-light)}
.header-right{display:flex;align-items:center;gap:12px}
.status-badge{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--text-dim)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.status-dot.offline{background:var(--text-faint);box-shadow:none;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-admin{background:transparent;border:1px solid var(--border-glow);color:var(--cyan);padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;text-decoration:none}
.btn-admin:hover{background:var(--cyan-dim);border-color:var(--cyan)}

.filters-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px}
.filters-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;font-weight:500}
.fg select,.fg input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-family:inherit;font-size:13px;outline:none;transition:border-color .2s;height:34px}
.fg select{padding-right:26px;appearance:none;cursor:pointer}
.fg select option{background:var(--bg2)}
.fg select:focus,.fg input:focus{border-color:var(--border-glow)}
.fg select:disabled{opacity:.4;cursor:not-allowed}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;font-size:11px}
.fg.search{flex:1;min-width:180px}
.fg.search input{width:100%;padding-left:32px}
.search-wrap{position:relative}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:13px}
.btn-reset{height:34px;padding:0 14px;background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .2s;align-self:flex-end;white-space:nowrap}
.btn-reset:hover{border-color:var(--border-glow);color:var(--text)}

/* realm stats */
.realm-stats{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center;font-size:12px;color:var(--text-dim)}
.realm-stats .rs-title{font-weight:600;color:var(--gold);font-size:13px;margin-right:4px}
.realm-stats .rs-item{display:inline-flex;align-items:center;gap:4px}
.realm-stats .rs-num{font-weight:700;color:var(--text)}
.realm-stats .rs-grade{padding:1px 6px;border-radius:10px;font-size:11px;font-weight:600}

/* guild tags bar */
.guild-tags{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:12px}
.guild-tags .gt-label{font-weight:600;color:var(--gold);font-size:12px;margin-right:2px;flex-basis:100%}
.guild-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:14px;background:rgba(42,79,138,.12);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .2s;font-size:12px;white-space:nowrap}
.guild-tag:hover{border-color:var(--cyan-dim);color:var(--cyan);background:rgba(79,195,247,.08)}
.guild-tag .gt-count{font-weight:700;color:var(--text);font-size:11px}

.stats-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.result-count{font-size:13px;color:var(--text-dim)}
.result-count strong{color:var(--gold)}
.sort-wrap{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim)}
.sort-wrap .sel-wrap select{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:4px 22px 4px 8px;border-radius:5px;font-family:inherit;font-size:12px;outline:none;appearance:none;cursor:pointer;height:30px}

/* ── BUBBLE TOOLTIP ── */
.bubble-row{position:relative;cursor:default}
.bubble-icon{font-size:12px;margin-left:4px;cursor:pointer;vertical-align:middle;opacity:.7;transition:opacity .2s}
.bubble-icon:hover{opacity:1}
.bubble-tooltip{
  display:none;position:absolute;z-index:50;
  bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--bg2);border:1px solid var(--gold);border-radius:10px;
  padding:8px 14px;font-size:13px;color:var(--gold-light);
  white-space:nowrap;pointer-events:none;
  box-shadow:0 4px 20px var(--shadow);
  animation:bubbleFadeIn .2s ease;
}
.bubble-tooltip::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:var(--gold);
}
@keyframes bubbleFadeIn{from{opacity:0;transform:translateX(-50%) translateY(4px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* 데스크탑: hover */
@media(min-width:601px){.bubble-row:hover .bubble-tooltip{display:block}}
/* 모바일: 토글 클릭 */
.bubble-tooltip.show{display:block}

/* ── TABLE: fixed layout ── */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
col.c-rank  {width:60px}
col.c-nick  {width:auto}   /* flex remaining */
col.c-tags  {visibility:collapse;width:0}  /* hidden on desktop, shown on mobile */
col.c-job   {width:130px}
col.c-level {width:80px}
col.c-world {width:110px}
col.c-realm {width:120px}
col.c-grade {width:120px}

/* 모바일 합쳐진 태그 열: 데스크탑에서 숨김 */
thead th.td-tags,.td-tags{visibility:collapse;padding:0!important;border:0!important;width:0;overflow:hidden;font-size:0;line-height:0}
.td-tags .level-val{font-size:12px;padding:2px 7px;background:var(--bg3);border:1px solid var(--border);border-radius:4px}

thead tr{background:linear-gradient(90deg,#0d1c35,#0a1628);border-bottom:1px solid var(--border-glow)}
thead th{padding:11px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;overflow:hidden}
tbody tr{border-bottom:1px solid rgba(30,51,88,.5);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(42,79,138,.12)}
tbody td{padding:12px 14px;vertical-align:middle;overflow:hidden}

/* rank */
.td-rank{text-align:center}
.rank-num{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--text-dim)}
.rank-1 .rank-num{background:linear-gradient(135deg,#ffd700,#ffaa00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rank-2 .rank-num{background:linear-gradient(135deg,#c0c0c0,#e8e8e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rank-3 .rank-num{background:linear-gradient(135deg,#cd7f32,#e8a060);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.crown{font-size:18px}

/* nick */
.nick-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.guild-name{display:inline-block;font-size:11px;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.guild-name::before{content:'⚔ '}
.guild-name:hover{color:var(--cyan);text-decoration:underline;text-underline-offset:2px}

/* job */
.job-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid transparent;white-space:nowrap}
.job-환영검사{background:rgba(239,83,80,.12);border-color:rgba(239,83,80,.35);color:#ef9a9a}
.job-주문각인사{background:rgba(171,71,188,.12);border-color:rgba(171,71,188,.35);color:#ce93d8}
.job-집행관{background:rgba(255,167,38,.12);border-color:rgba(255,167,38,.35);color:#ffcc80}
.job-향사수{background:rgba(102,187,106,.12);border-color:rgba(102,187,106,.35);color:#a5d6a7}
.job-강령술사{background:rgba(38,166,154,.12);border-color:rgba(38,166,154,.35);color:#80cbc4}
.job-태양감시자{background:rgba(255,200,0,.12);border-color:rgba(255,200,0,.35);color:#ffe066}
.job-심연추방자{background:rgba(63,81,181,.12);border-color:rgba(63,81,181,.35);color:#9fa8da}
.job-야만투사{background:rgba(255,112,67,.12);border-color:rgba(255,112,67,.35);color:#ffab91}

/* level */
.level-val{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--cyan)}

/* world / realm */
.world-badge,.realm-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:12px;white-space:nowrap}
.world-badge{background:var(--bg3);border:1px solid var(--border);color:var(--text-dim)}
.realm-badge{background:rgba(42,79,138,.15);border:1px solid var(--border-glow);color:#93c5fd}
/* 동적 월드 컬러는 JS에서 style로 적용 */

/* conquest grade */
.cq{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.cq-신화{background:rgba(255,100,30,.15);border:1px solid rgba(255,100,30,.5);color:#ff9966}
.cq-전설{background:rgba(234,179,8,.12);border:1px solid rgba(234,179,8,.4);color:#fde047}
.cq-영웅{background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.4);color:#d8b4fe}
.cq-희귀{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.4);color:#93c5fd}
.cq-일반{background:var(--bg3);border:1px solid var(--border);color:var(--text-dim)}

/* empty / pagination */
.empty-state{padding:70px 20px;text-align:center;color:var(--text-dim)}
.empty-state .icon{font-size:44px;margin-bottom:14px;opacity:.4}
.empty-state h3{font-size:15px;margin-bottom:6px}
.pagination{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:18px;flex-wrap:wrap}
.page-btn{min-width:34px;height:34px;padding:0 9px;background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);border-radius:6px;font-family:inherit;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.page-btn:hover:not(:disabled){border-color:var(--border-glow);color:var(--text)}
.page-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light);font-weight:600}
.page-btn:disabled{opacity:.3;cursor:default}
.page-ellipsis{color:var(--text-faint);padding:0 3px}

.sample-banner{background:rgba(255,167,38,.1);border:1px solid rgba(255,167,38,.3);border-radius:8px;padding:9px 14px;margin-bottom:14px;font-size:12px;color:#ffcc80;display:flex;align-items:center;gap:8px}
.sample-banner.hidden,.hidden{display:none!important}
#toast{position:fixed;bottom:22px;right:22px;background:var(--bg3);border:1px solid var(--border-glow);color:var(--text);padding:11px 16px;border-radius:8px;font-size:13px;z-index:100;opacity:0;transform:translateY(10px);transition:all .25s;box-shadow:0 8px 32px var(--shadow)}
#toast.show{opacity:1;transform:translateY(0)}

/* ── LIGHT THEME OVERRIDES ── */
:root[data-theme="light"] thead tr{background:linear-gradient(90deg,#dce2ec,#e8ecf2)}
:root[data-theme="light"] tbody tr{border-bottom-color:var(--border)}
:root[data-theme="light"] tbody tr:hover{background:var(--hover-bg)}
:root[data-theme="light"] .job-환영검사{background:rgba(239,83,80,.08);color:#c62828}
:root[data-theme="light"] .job-주문각인사{background:rgba(171,71,188,.08);color:#7b1fa2}
:root[data-theme="light"] .job-집행관{background:rgba(255,167,38,.08);color:#e65100}
:root[data-theme="light"] .job-향사수{background:rgba(102,187,106,.08);color:#2e7d32}
:root[data-theme="light"] .job-강령술사{background:rgba(38,166,154,.08);color:#00695c}
:root[data-theme="light"] .job-태양감시자{background:rgba(255,200,0,.08);color:#f57f17}
:root[data-theme="light"] .job-심연추방자{background:rgba(63,81,181,.08);color:#283593}
:root[data-theme="light"] .job-야만투사{background:rgba(255,112,67,.08);color:#bf360c}
:root[data-theme="light"] .cq-신화{background:rgba(255,100,30,.08);color:#d84315}
:root[data-theme="light"] .cq-전설{background:rgba(234,179,8,.08);color:#f57f17}
:root[data-theme="light"] .cq-영웅{background:rgba(168,85,247,.08);color:#7b1fa2}
:root[data-theme="light"] .cq-희귀{background:rgba(59,130,246,.08);color:#1565c0}
:root[data-theme="light"] .cq-일반{background:var(--bg3);color:var(--text-dim)}
:root[data-theme="light"] .guild-tag{background:rgba(100,140,200,.08)}
:root[data-theme="light"] .guild-tag:hover{background:rgba(2,119,181,.08);color:var(--cyan)}
:root[data-theme="light"] .rank-1 .rank-num{background:linear-gradient(135deg,#b8860b,#8b6914);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
:root[data-theme="light"] .rank-2 .rank-num{background:linear-gradient(135deg,#808080,#606060);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
:root[data-theme="light"] .rank-3 .rank-num{background:linear-gradient(135deg,#a0522d,#8b4513);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
:root[data-theme="light"] .logo-icon{box-shadow:0 0 12px rgba(154,123,24,.2)}
:root[data-theme="light"] .made-by{background:linear-gradient(90deg,var(--gold),var(--gold-light));-webkit-background-clip:text;background-clip:text}

/* theme toggle */
.theme-toggle{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.theme-btn{background:none;border:none;color:var(--text-faint);padding:5px 8px;cursor:pointer;font-size:14px;line-height:1;transition:all .2s;display:flex;align-items:center;justify-content:center}
.theme-btn:hover{color:var(--text-dim)}
.theme-btn.active{background:var(--border-glow);color:var(--gold-light)}

/* ── GUILD MODAL ── */
.guild-modal-overlay{position:fixed;inset:0;background:var(--overlay-bg);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.guild-modal-overlay.active{display:flex}
.guild-modal{background:var(--bg2);border:1px solid var(--border-glow);border-radius:16px;width:95%;max-width:560px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 16px 64px var(--shadow);animation:gm-in .2s ease-out}
@keyframes gm-in{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.gm-header{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.gm-header h2{font-family:'Cinzel',serif;font-size:17px;color:var(--gold-light);display:flex;align-items:center;gap:8px}
.gm-header h2 span{font-size:13px;color:var(--text-dim);font-family:'Noto Sans KR',sans-serif;font-weight:400}
.gm-close{background:transparent;border:1px solid var(--border);color:var(--text-dim);width:32px;height:32px;border-radius:6px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.gm-close:hover{border-color:var(--border-glow);color:var(--text)}
.gm-stats{padding:16px 22px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:10px;font-size:12px;color:var(--text-dim)}
.gm-stats-row{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center}
.gm-stats-label{font-weight:600;color:var(--cyan);font-size:11px;text-transform:uppercase;letter-spacing:.06em;flex-basis:100%}
.gm-stats .rs-item{display:inline-flex;align-items:center;gap:4px}
.gm-stats .rs-num{font-weight:700;color:var(--text)}
.gm-stats .rs-grade{padding:1px 6px;border-radius:10px;font-size:11px;font-weight:600}
.gm-list{overflow-y:auto;flex:1;min-height:0}
.gm-bubble{display:none;font-size:11px;color:var(--gold-light);font-weight:400;margin-left:6px;white-space:nowrap}
.gm-list tbody tr:hover .gm-bubble{display:inline}
.gm-list table{width:100%;border-collapse:collapse}
.gm-list thead tr{background:var(--bg3);position:sticky;top:0;z-index:1}
.gm-list thead th{padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}
.gm-list tbody tr{border-bottom:1px solid rgba(30,51,88,.4);transition:background .15s}
.gm-list tbody tr:hover{background:rgba(42,79,138,.1)}
.gm-list tbody td{padding:10px 14px;font-size:13px}
.gm-list .gm-rank{text-align:center;width:44px;font-family:'Cinzel',serif;font-weight:700;color:var(--text-dim)}
.gm-list .gm-nick{font-weight:600;color:var(--text)}
.gm-list .gm-job{white-space:nowrap}

<script>
const USER_TOKEN_KEY = 'prasia_user_token';
const ADMIN_TOKEN_KEY = 'prasia_admin_token';
// localStorage(자동로그인) 또는 sessionStorage(현재 세션만)에서 토큰 확인
let userToken = localStorage.getItem(USER_TOKEN_KEY) || sessionStorage.getItem(USER_TOKEN_KEY) || localStorage.getItem(ADMIN_TOKEN_KEY) || '';

function authHeaders() { return userToken ? { 'X-User-Token': userToken } : {}; }
function authFetch(url, opts = {}) {
  opts.headers = { ...opts.headers, ...authHeaders() };
  return fetch(url, opts);
}

async function checkLogin() {
  const overlay = document.getElementById('loginOverlay');
  try {
    const res = await fetch('/api/user/check', { headers: authHeaders() });
    const data = await res.json();
    if (!data.requireLogin || data.loggedIn) {
      overlay.style.display = 'none';
      if (data.isAdmin) document.getElementById('adminLink').style.display = '';
      startAutoLogout(data.autoLogoutMin ?? 30);
      init();
    } else {
      overlay.style.display = 'flex';
    }
  } catch {
    // 서버 연결 실패 시 일단 표시
    overlay.style.display = 'flex';
  }
}

async function doUserLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginError');
  if (!id || !pw) { err.textContent = '아이디와 비밀번호를 입력하세요.'; return; }
  try {
    const res = await fetch('/api/user/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, password: pw })
    });
    const data = await res.json();
    if (data.success) {
      userToken = data.token;
      const autoLogin = document.getElementById('autoLoginCheck').checked;
      if (autoLogin) {
        localStorage.setItem(USER_TOKEN_KEY, userToken);
      } else {
        localStorage.removeItem(USER_TOKEN_KEY);
        sessionStorage.setItem(USER_TOKEN_KEY, userToken);
      }
      document.getElementById('loginOverlay').style.display = 'none';
      if (data.isAdmin) document.getElementById('adminLink').style.display = '';
      init();
    } else {
      err.textContent = data.message || '로그인 실패';
    }
  } catch { err.textContent = '서버 연결 실패'; }
}

const PER_PAGE    = 50;
// 토벌등급: 숫자 또는 텍스트 모두 지원
const GRADE_TEXT_TO_NUM = { '신화':24, '전설':20, '영웅':16, '희귀':12, '일반':1 };
function gradeNum(v) {
  if (typeof v === 'number') return v;
  const n = Number(v);
  if (!isNaN(n) && n > 0) return n;
  return GRADE_TEXT_TO_NUM[String(v)] || 0;
}
function gradeLabel(v) {
  const n = gradeNum(v);
  if (n >= 24) return '신화';
  if (n >= 20) return '전설';
  if (n >= 16) return '영웅';
  if (n >= 12) return '희귀';
  return '일반';
}
function gradeIcon(v) {
  return { 신화:'👑', 전설:'⚡', 영웅:'🌟', 희귀:'💎', 일반:'🛡' }[gradeLabel(v)] || '🛡';
}
function gradeCls(v) { return `cq cq-${gradeLabel(v)}`; }
function gradeDisplay(v) { const n = gradeNum(v); return n > 0 ? n : '-'; }

// 월드별 고유 색상 생성
const WORLD_COLORS = {};
let _worldHueIdx = 0;
const _HUES = [210,30,150,340,70,270,110,190,310,50,240,10,170,290,130,350,90,230,330,60,200,20,160,280,100];
function getWorldColor(world) {
  if (!world) return null;
  if (!WORLD_COLORS[world]) {
    const hue = _HUES[_worldHueIdx % _HUES.length];
    _worldHueIdx++;
    WORLD_COLORS[world] = { hue, sat: 60, light: 65 };
  }
  return WORLD_COLORS[world];
}
function worldStyle(world) {
  const c = getWorldColor(world);
  if (!c) return '';
  return `background:hsla(${c.hue},${c.sat}%,${c.light}%,.12);border-color:hsla(${c.hue},${c.sat}%,${c.light}%,.4);color:hsl(${c.hue},${c.sat}%,${c.light}%)`;
}
// 렐름별 고유 색상 생성 (같은 월드 내 렐름끼리 hue 오프셋으로 구분)
const REALM_COLORS = {};
function getRealmColor(world, realm) {
  if (!realm) return getWorldColor(world);
  const key = `${world}\t${realm}`;
  if (!REALM_COLORS[key]) {
    const wc = getWorldColor(world);
    if (!wc) return null;
    // 렐름 번호 추출 (예: "론도 01" → 1, "론도 02" → 2)
    const m = realm.match(/(\d+)\s*$/);
    const idx = m ? parseInt(m[1], 10) : 0;
    // 월드 hue 기준으로 렐름마다 25도씩 오프셋 + 채도/밝기 미세 변화
    const hue = (wc.hue + idx * 25) % 360;
    const sat = 55 + (idx % 3) * 8;
    const light = 60 + (idx % 4) * 5;
    REALM_COLORS[key] = { hue, sat, light };
  }
  return REALM_COLORS[key];
}
function realmStyle(world, realm) {
  const c = getRealmColor(world, realm);
  if (!c) return '';
  return `background:hsla(${c.hue},${c.sat}%,${c.light}%,.12);border-color:hsla(${c.hue},${c.sat}%,${c.light}%,.4);color:hsl(${c.hue},${c.sat}%,${c.light}%)`;
}
const JOB_ICONS   = { 환영검사:'⚔', 주문각인사:'📖', 집행관:'🛡', 향사수:'🏹', 강령술사:'💀', 태양감시자:'☀', 심연추방자:'🌑', 야만투사:'🪓' };

let allData = [];
let worldRealmMap = {};  // { '론도': ['론도 01', ...] }
let filtered  = [];
let currentPage = 1;
let displayConfig = { minConquestGrade: 0 };
let bubbleMap = {};  // key: 'guild|nickname' → message

// ── INIT ─────────────────────────────────────────────────────────
async function init() {
  try {
    const [dRes, sRes, dispRes, bRes] = await Promise.all([authFetch('/api/data'), authFetch('/api/status'), fetch('/api/display'), fetch('/api/bubbles')]);
    const data   = await dRes.json();
    const status = await sRes.json();
    try { displayConfig = await dispRes.json(); } catch {}
    try {
      const bubbles = await bRes.json();
      bubbleMap = {};
      (Array.isArray(bubbles) ? bubbles : []).forEach(b => {
        bubbleMap[b.guild + '|' + b.nickname] = b.message;
      });
    } catch {}
    allData = (data.characters || []).map((c, i) => ({ ...c, rank: c.rank || i + 1 }));

    if (status.isSample) document.getElementById('sampleBanner').classList.remove('hidden');

    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    if (status.lastUpdated) {
      dot.classList.remove('offline');
      const d = new Date(status.lastUpdated);
      txt.textContent = `${d.toLocaleDateString('ko-KR')} ${d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})} 수집`;
    } else {
      txt.textContent = '데이터 없음';
    }

    buildMaps();
    buildFilters();
    applyFilters();
  } catch(e) {
    document.getElementById('statusText').textContent = '서버 연결 실패';
  }
}

// ── MAPS ─────────────────────────────────────────────────────────
function buildMaps() {
  worldRealmMap = {};
  allData.forEach(c => {
    if (!c.world) return;
    if (!worldRealmMap[c.world]) worldRealmMap[c.world] = new Set();
    if (c.realm) worldRealmMap[c.world].add(c.realm);
  });
  // 월드별 색상 미리 할당 (정렬 순서 기준)
  Object.keys(worldRealmMap).sort(naturalSort).forEach(w => getWorldColor(w));
}

// ── BUILD FILTERS ────────────────────────────────────────────────
function buildFilters() {
  const worlds = Object.keys(worldRealmMap).sort(naturalSort);
  populate('fWorld', worlds);

  const jobs = [...new Set(allData.map(c => c.job).filter(Boolean))].sort();
  populate('fJob', jobs);

  const gradeSet = new Map();
  allData.forEach(c => {
    const n = gradeNum(c.conquestGrade);
    if (n > 0) gradeSet.set(n, gradeLabel(n));
  });
  const grades = [...gradeSet.entries()].sort((a,b) => b[0] - a[0]);
  const gradeSel = document.getElementById('fGrade');
  grades.forEach(([n, label]) => {
    const o = document.createElement('option');
    o.value = n; o.textContent = `${n} (${label})`;
    gradeSel.appendChild(o);
  });

  buildLevelSelect();

  // ★ Fix 1: fRealm에도 change 이벤트 등록
  document.getElementById('fWorld').addEventListener('change', onWorldChange);
  document.getElementById('fRealm').addEventListener('change', applyFilters);
  ['fJob','fGrade','fLevel'].forEach(id =>
    document.getElementById(id).addEventListener('change', applyFilters)
  );
  document.getElementById('fSearch').addEventListener('input', applyFilters);
}

function buildLevelSelect() {
  const levels = allData.map(c => c.level).filter(n => n > 0);
  if (!levels.length) return;
  const minLv = Math.min(...levels), maxLv = Math.max(...levels);
  const range = maxLv - minLv;
  const step  = range <= 20 ? 1 : range <= 50 ? 5 : 10;

  const bands = new Set();
  levels.forEach(lv => bands.add(Math.floor(lv / step) * step));
  const sorted = [...bands].sort((a,b) => b - a);

  const sel = document.getElementById('fLevel');
  sorted.forEach(band => {
    const lo = band, hi = band + step - 1;
    const o  = document.createElement('option');
    o.value  = `${lo}:${hi}`;
    o.textContent = step === 1 ? `${lo}` : `${lo} ~ ${hi}`;
    sel.appendChild(o);
  });
}

function populate(id, items) {
  const sel = document.getElementById(id);
  items.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    sel.appendChild(o);
  });
}

function naturalSort(a, b) {
  return a.localeCompare(b, 'ko', { numeric:true });
}

// ── WORLD → REALM CASCADE ────────────────────────────────────────
function onWorldChange() {
  const world = document.getElementById('fWorld').value;
  const rs    = document.getElementById('fRealm');
  rs.innerHTML = '<option value="">전체</option>';

  if (world && worldRealmMap[world]) {
    const realms = [...worldRealmMap[world]].sort(naturalSort);
    realms.forEach(r => {
      const o = document.createElement('option');
      o.value = r; o.textContent = r;
      rs.appendChild(o);
    });
    rs.disabled = false;
  } else {
    rs.disabled = true;
  }
  applyFilters();
}

// ── APPLY FILTERS & SORT ─────────────────────────────────────────
function applyFilters() {
  const world  = document.getElementById('fWorld').value;
  const realm  = document.getElementById('fRealm').value;
  const job    = document.getElementById('fJob').value;
  const grade  = document.getElementById('fGrade').value;
  const lvBand = document.getElementById('fLevel').value;
  const q      = document.getElementById('fSearch').value.trim().toLowerCase();
  const sortBy = document.getElementById('sortBy').value;

  let lvMin = 0, lvMax = 9999;
  if (lvBand) { const [lo,hi] = lvBand.split(':').map(Number); lvMin=lo; lvMax=hi; }

  filtered = allData.filter(c =>
    (!world || c.world === world) &&
    (!realm || c.realm === realm) &&
    (!job   || c.job   === job)   &&
    (!grade || gradeNum(c.conquestGrade) === Number(grade)) &&
    (c.level >= lvMin && c.level <= lvMax) &&
    (!q || c.nickname?.toLowerCase().includes(q) || c.guild?.toLowerCase().includes(q))
  );

  filtered.sort((a,b) => {
    if (sortBy==='level_desc') return (b.level||0)-(a.level||0);
    if (sortBy==='level_asc')  return (a.level||0)-(b.level||0);
    if (sortBy==='nickname')   return (a.nickname||'').localeCompare(b.nickname||'','ko');
    return (a.rank||0)-(b.rank||0);
  });

  const hasFilter = !!(world || realm || job || grade || lvBand || q);

  updateRealmStats(world, realm);
  updateGuildTags(!world, hasFilter);

  currentPage = 1;
  renderTable();
}

// ── RENDER ───────────────────────────────────────────────────────
function renderTable() {
  const total = filtered.length;
  document.getElementById('resultCount').innerHTML =
    `캐릭터 <strong>${total.toLocaleString()}</strong>명`;

  const page  = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');

  if (!page.length) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  empty.classList.add('hidden');
  tbody.innerHTML = page.map(renderRow).join('');
  renderPagination(total);
}

function renderRow(c) {
  const r      = c.rank;
  const crown  = {1:'🥇',2:'🥈',3:'🥉'}[r];
  const rankHtml = crown ? `<span class="crown">${crown}</span>` : `<span class="rank-num">${r}</span>`;
  const jobIcon  = JOB_ICONS[c.job] || '⚔';
  const gv = c.conquestGrade;
  const gd = gradeDisplay(gv);
  const gi = gradeIcon(gv);
  const gc = gradeCls(gv);
  const bubbleMsg = bubbleMap[(c.guild || '') + '|' + c.nickname];
  const bubbleIcon = bubbleMsg ? `<span class="bubble-icon" onclick="event.stopPropagation();toggleBubble(this)">💬</span>` : '';
  const bubbleHtml = bubbleMsg ? `<div class="bubble-tooltip">${esc(bubbleMsg)}</div>` : '';
  const trCls = bubbleMsg ? ' class="bubble-row"' : '';
  return `<tr${trCls}>
    <td class="td-rank rank-${r<=3?r:''}">${rankHtml}</td>
    <td>
      <div class="nick-name">${esc(c.nickname)}${bubbleIcon}</div>
      ${c.guild?`<div class="guild-name" style="cursor:pointer" onclick="event.stopPropagation();openGuildModal('${esc(c.guild).replace(/'/g,"\\&#39;")}','${esc(c.realm||'').replace(/'/g,"\\&#39;")}')">${esc(c.guild)}</div>`:''}
      ${bubbleHtml}
    </td>
    <td class="td-tags">
      <span class="job-badge job-${esc(c.job)}">${jobIcon} ${esc(c.job)}</span>
      <span class="level-val">Lv.${c.level}</span>
      <span class="${gc}">${gi} ${gd}</span>
    </td>
    <td class="td-job-only"><span class="job-badge job-${esc(c.job)}">${jobIcon} ${esc(c.job)}</span></td>
    <td class="td-level-only"><span class="level-val">${c.level}</span></td>
    <td class="col-world"><span class="world-badge" style="${worldStyle(c.world)}">${esc(c.world)}</span></td>
    <td class="col-realm"><span class="realm-badge" style="${realmStyle(c.world, c.realm)}">${esc(c.realm||'-')}</span></td>
    <td class="td-grade-only"><span class="${gc}">${gi} ${gd}</span></td>
  </tr>`;
}

function renderPagination(total) {
  const tp = Math.ceil(total/PER_PAGE);
  if (tp<=1) { document.getElementById('pagination').innerHTML=''; return; }
  const range = 2;
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i=1; i<=tp; i++) {
    if (i===1||i===tp||(i>=currentPage-range&&i<=currentPage+range))
      html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    else if (i===currentPage-range-1||i===currentPage+range+1)
      html+=`<span class="page-ellipsis">…</span>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===tp?'disabled':''}>›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  const tp = Math.ceil(filtered.length/PER_PAGE);
  if (p<1||p>tp) return;
  currentPage=p; renderTable();
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetFilters() {
  ['fWorld','fJob','fGrade','fLevel'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('sortBy').value='level_desc';
  const rs=document.getElementById('fRealm');
  rs.innerHTML='<option value="">전체</option>'; rs.disabled=true;
  document.getElementById('fSearch').value='';
  applyFilters();
}

// ── REALM STATS ─────────────────────────────────────────────────
function updateRealmStats(world, realm) {
  const el = document.getElementById('realmStats');
  if (!world && !realm) { el.classList.add('hidden'); return; }

  // 해당 월드/렐름의 전체 데이터 (필터 무관)
  const pool = allData.filter(c =>
    (!world || c.world === world) &&
    (!realm || c.realm === realm)
  );

  // 레벨별 인원수 (최소값 필터 적용, 높은순)
  const minLevel = displayConfig.minLevel || 0;
  const levelCounts = {};
  pool.forEach(c => {
    if (c.level > 0 && c.level >= minLevel) levelCounts[c.level] = (levelCounts[c.level] || 0) + 1;
  });
  const levelKeys = Object.keys(levelCounts).map(Number).sort((a,b) => b - a);

  // 토벌등급별 인원수 (최소값 필터 적용, 높은순)
  const minGrade = displayConfig.minConquestGrade || 0;
  const gradeCounts = {};
  pool.forEach(c => {
    const g = gradeNum(c.conquestGrade);
    if (g > 0 && g >= minGrade) gradeCounts[g] = (gradeCounts[g] || 0) + 1;
  });
  const gradeKeys = Object.keys(gradeCounts).map(Number).sort((a,b) => b - a);

  const label = realm || world;
  let html = `<span class="rs-title">${esc(label)}</span>`;

  // 레벨별 인원수
  levelKeys.forEach(lv => {
    html += `<span class="rs-item">Lv.${lv} <span class="rs-num">${levelCounts[lv]}</span>명</span>`;
  });

  if (gradeKeys.length > 0) {
    html += '<span style="color:var(--border-glow)">│</span>';
    gradeKeys.forEach(g => {
      const cls = gradeCls(g);
      html += `<span class="rs-item"><span class="rs-grade ${cls}">${gradeIcon(g)} ${g}</span> <span class="rs-num">${gradeCounts[g]}</span>명</span>`;
    });
  }

  el.innerHTML = html;
  el.classList.remove('hidden');
}

// ── GUILD TAGS ──────────────────────────────────────────────────
function guildScore(members) {
  // 결사 점수: 레벨 합산 + 토벌등급 합산×2 (토벌이 더 희소하므로 가중)
  let score = 0;
  members.forEach(c => {
    score += (c.level || 0) + gradeNum(c.conquestGrade) * 2;
  });
  return score;
}

function updateGuildTags(limitTop, hasFilter) {
  const el = document.getElementById('guildTags');
  // 렐름+결사명 복합키로 그룹핑
  const guildMap = {};
  filtered.forEach(c => {
    if (!c.guild) return;
    const key = `${c.realm||''}\t${c.guild}`;
    if (!guildMap[key]) guildMap[key] = { guild: c.guild, realm: c.realm||'', members: [] };
    guildMap[key].members.push(c);
  });
  let guilds = Object.values(guildMap);
  guilds.forEach(g => { g.score = guildScore(g.members); });
  guilds.sort((a,b) => b.score - a.score);

  // 필터 없을 때만 10명 제한, 필터 적용 시에는 전체 표시
  if (!hasFilter) guilds = guilds.filter(g => g.members.length >= 10);
  if (limitTop) guilds = guilds.slice(0, 20);

  if (!guilds.length) { el.classList.add('hidden'); return; }

  let html = `<span class="gt-label">⚔ 결사</span>`;
  guilds.forEach(g => {
    const realmLabel = g.realm ? ` <span style="opacity:.5;font-size:10px">${esc(g.realm)}</span>` : '';
    html += `<span class="guild-tag" onclick="openGuildModal('${esc(g.guild).replace(/'/g,"\\&#39;")}','${esc(g.realm).replace(/'/g,"\\&#39;")}')">${esc(g.guild)}${realmLabel} <span class="gt-count">${g.members.length}</span></span>`;
  });
  el.innerHTML = html;
  el.classList.remove('hidden');
}

// ── 자동 로그아웃 ──────────────────────────────────────────────
let autoLogoutTimer = null;
function startAutoLogout(minutes) {
  if (autoLogoutTimer) clearTimeout(autoLogoutTimer);
  if (!minutes || minutes <= 0) return;
  const ms = minutes * 60 * 1000;
  // 활동 감지 시 타이머 리셋
  const reset = () => {
    if (autoLogoutTimer) clearTimeout(autoLogoutTimer);
    autoLogoutTimer = setTimeout(doLogout, ms);
  };
  ['click','keydown','scroll','mousemove','touchstart'].forEach(e => document.addEventListener(e, reset, { passive: true }));
  autoLogoutTimer = setTimeout(doLogout, ms);
}

function doLogout() {
  localStorage.removeItem(USER_TOKEN_KEY);
  sessionStorage.removeItem(USER_TOKEN_KEY);
  localStorage.removeItem(ADMIN_TOKEN_KEY);
  userToken = '';
  location.reload();
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function copyAccount(){
  navigator.clipboard.writeText('3333068236156').then(()=>showToast('🧪 계좌번호가 복사되었습니다. 감사합니다!'));
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

// ── GUILD MODAL ──────────────────────────────────────────────────
function openGuildModal(guildName, realm) {
  const members = allData.filter(c => c.guild === guildName && (!realm || c.realm === realm)).sort((a,b) => (a.rank||0)-(b.rank||0));
  if (!members.length) return;

  const realmLabel = realm ? ` <span style="font-size:12px;color:var(--text-faint)">${esc(realm)}</span>` : '';
  document.getElementById('gmTitle').innerHTML = `⚔ ${esc(guildName)}${realmLabel} <span>${members.length}명</span>`;

  // 통계: 레벨별
  const levelCounts = {};
  members.forEach(c => { if (c.level > 0) levelCounts[c.level] = (levelCounts[c.level]||0)+1; });
  const levelKeys = Object.keys(levelCounts).map(Number).sort((a,b)=>b-a);

  // 통계: 토벌등급별
  const gCounts = {};
  members.forEach(c => { const g = gradeNum(c.conquestGrade); if (g > 0) gCounts[g] = (gCounts[g]||0)+1; });
  const gKeys = Object.keys(gCounts).map(Number).sort((a,b)=>b-a);

  let statsHtml = '<div class="gm-stats-row"><span class="gm-stats-label">레벨</span>';
  levelKeys.forEach(lv => { statsHtml += `<span class="rs-item">Lv.${lv} <span class="rs-num">${levelCounts[lv]}</span></span>`; });
  statsHtml += '</div>';

  if (gKeys.length) {
    statsHtml += '<div class="gm-stats-row"><span class="gm-stats-label">토벌</span>';
    gKeys.forEach(g => { statsHtml += `<span class="rs-item"><span class="rs-grade ${gradeCls(g)}">${gradeIcon(g)} ${g}</span> <span class="rs-num">${gCounts[g]}</span></span>`; });
    statsHtml += '</div>';
  }
  document.getElementById('gmStats').innerHTML = statsHtml;

  // 리스트
  let listHtml = '<table><thead><tr><th class="gm-rank">랭킹</th><th>닉네임</th><th class="gm-job">직업</th><th class="gm-lv">레벨</th><th class="gm-grade">토벌</th></tr></thead><tbody>';
  members.forEach((c, idx) => {
    const gv = c.conquestGrade;
    const jobIcon = JOB_ICONS[c.job] || '⚔';
    const bMsg = bubbleMap[(c.guild || '') + '|' + c.nickname];
    const bHtml = bMsg ? `<span class="gm-bubble">💬 ${esc(bMsg)}</span>` : '';
    listHtml += `<tr>
      <td class="gm-rank">${idx + 1}</td>
      <td class="gm-nick">${esc(c.nickname)}${bHtml}</td>
      <td class="gm-job"><span class="job-badge job-${esc(c.job)}">${jobIcon} ${esc(c.job)}</span></td>
      <td class="gm-lv"><span class="level-val">${c.level}</span></td>
      <td class="gm-grade"><span class="${gradeCls(gv)}">${gradeIcon(gv)} ${gradeDisplay(gv)}</span></td>
    </tr>`;
  });
  listHtml += '</tbody></table>';
  document.getElementById('gmList').innerHTML = listHtml;

  document.getElementById('guildModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

// 모바일 말풍선 토글
function toggleBubble(icon) {
  const row = icon.closest('.bubble-row');
  if (!row) return;
  const tip = row.querySelector('.bubble-tooltip');
  if (!tip) return;
  const wasOpen = tip.classList.contains('show');
  // 다른 열린 말풍선 모두 닫기
  document.querySelectorAll('.bubble-tooltip.show').forEach(t => t.classList.remove('show'));
  if (!wasOpen) tip.classList.add('show');
}
// 말풍선 외부 클릭 시 닫기
document.addEventListener('click', e => {
  if (!e.target.closest('.bubble-icon') && !e.target.closest('.bubble-tooltip')) {
    document.querySelectorAll('.bubble-tooltip.show').forEach(t => t.classList.remove('show'));
  }
});

function closeGuildModal() {
  document.getElementById('guildModal').classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGuildModal(); });

// ── THEME TOGGLE ────────────────────────────────────────────────
(function initTheme() {
  const toggle = document.getElementById('themeToggle');
  const saved = localStorage.getItem('prasia-theme') || 'dark';

  function applyTheme(mode) {
    let effective = mode;
    if (mode === 'system') {
      effective = window.matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark';
    }
    document.documentElement.setAttribute('data-theme', effective);
  }

  function setActive(mode) {
    toggle.querySelectorAll('.theme-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.theme === mode);
    });
  }

  toggle.addEventListener('click', e => {
    const btn = e.target.closest('.theme-btn');
    if (!btn) return;
    const mode = btn.dataset.theme;
    localStorage.setItem('prasia-theme', mode);
    applyTheme(mode);
    setActive(mode);
  });

  window.matchMedia('(prefers-color-scheme:light)').addEventListener('change', () => {
    if (localStorage.getItem('prasia-theme') === 'system') applyTheme('system');
  });

  applyTheme(saved);
  setActive(saved);
})();

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e3a6e"/>
      <stop offset="100%" stop-color="#0f1f3d"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#ff9800" stroke-width="2.5"/>
  <!-- 회전 마법진 -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#ff9800" stroke-width="1.5" opacity="0.8" stroke-dasharray="6 4">
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="32" r="18" fill="none" stroke="#ffcc66" stroke-width="0.8" opacity="0.5" stroke-dasharray="4 6">
    <animateTransform attributeName="transform" type="rotate" from="360 32 32" to="0 32 32" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- 포탈 -->
  <ellipse cx="32" cy="32" rx="12" ry="16" fill="none" stroke="#ffcc66" stroke-width="1.5" opacity="0.6" transform="rotate(25 32 32)"/>
  <ellipse cx="32" cy="32" rx="12" ry="16" fill="none" stroke="#ffcc66" stroke-width="1.5" opacity="0.4" transform="rotate(-25 32 32)"/>
  <!-- 검 -->
  <line x1="32" y1="10" x2="32" y2="44" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
  <line x1="23" y1="36" x2="41" y2="36" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="36" x2="32" y2="50" stroke="#e6a800" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="32" cy="50" r="3" fill="#ff9800" stroke="#fff" stroke-width="0.5"/>
  <!-- 파티클 -->
  <circle cx="16" cy="16" r="2" fill="#ff9800" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="48" cy="20" r="1.5" fill="#ffcc66" opacity="0.8">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="46" cy="46" r="1.8" fill="#ff9800" opacity="0.8">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="44" r="1.3" fill="#ffcc66" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#6ec6ff"/>
      <stop offset="60%" stop-color="#3a7bd5"/>
      <stop offset="100%" stop-color="#1a3a6e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 밝은 배경 원 -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#a0d4ff" stroke-width="2.5"/>
  <!-- 내부 글로우 -->
  <circle cx="32" cy="28" r="20" fill="url(#glow)"/>
  <!-- 마법진 외곽 -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#ffd700" stroke-width="1.2" opacity="0.8"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#ffe066" stroke-width="0.5" opacity="0.4" stroke-dasharray="4 2"/>
  <!-- 이세계 포탈 링 -->
  <ellipse cx="32" cy="32" rx="13" ry="17" fill="none" stroke="#c8e6ff" stroke-width="1.8" opacity="0.8" transform="rotate(28 32 32)"/>
  <ellipse cx="32" cy="32" rx="13" ry="17" fill="none" stroke="#c8e6ff" stroke-width="1.8" opacity="0.5" transform="rotate(-28 32 32)"/>
  <!-- 검 - 칼날 -->
  <line x1="32" y1="11" x2="32" y2="42" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="13" x2="32" y2="35" stroke="#fff8d0" stroke-width="1.2" opacity="0.7"/>
  <!-- 가드 -->
  <line x1="23" y1="36" x2="41" y2="36" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 손잡이 -->
  <line x1="32" y1="36" x2="32" y2="49" stroke="#e6a800" stroke-width="3.5" stroke-linecap="round"/>
  <!-- 보석 -->
  <circle cx="32" cy="50" r="3" fill="#ffd700" stroke="#fff" stroke-width="0.8"/>
  <circle cx="32" cy="50" r="1.2" fill="#fff" opacity="0.7"/>
  <!-- 밝은 별들 -->
  <circle cx="14" cy="14" r="2.2" fill="#fff" opacity="0.9"/>
  <circle cx="14" cy="14" r="1" fill="#fff"/>
  <circle cx="50" cy="18" r="1.8" fill="#fff" opacity="0.85"/>
  <circle cx="48" cy="46" r="2" fill="#ffe066" opacity="0.9"/>
  <circle cx="16" cy="44" r="1.5" fill="#ffe066" opacity="0.8"/>
  <circle cx="32" cy="10" r="2.5" fill="#fff" opacity="0.8"/>
  <!-- 검 끝 빛 -->
  <circle cx="32" cy="11" r="3.5" fill="#fff" opacity="0.3"/>
</svg>

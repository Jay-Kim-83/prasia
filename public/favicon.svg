<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 배경: 마법진 원 -->
  <circle cx="32" cy="32" r="30" fill="#0a1628" stroke="#2a4f8a" stroke-width="2"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#c9a227" stroke-width="1" opacity="0.5"/>
  <!-- 포탈 이펙트 -->
  <ellipse cx="32" cy="32" rx="16" ry="20" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.6" transform="rotate(20 32 32)"/>
  <ellipse cx="32" cy="32" rx="16" ry="20" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.4" transform="rotate(-20 32 32)"/>
  <!-- 중앙 검 -->
  <line x1="32" y1="12" x2="32" y2="46" stroke="#f0cc6a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 검 가드 -->
  <line x1="24" y1="38" x2="40" y2="38" stroke="#f0cc6a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 검 손잡이 -->
  <line x1="32" y1="38" x2="32" y2="50" stroke="#c9a227" stroke-width="3" stroke-linecap="round"/>
  <!-- 검 끝 보석 -->
  <circle cx="32" cy="50" r="2.5" fill="#c9a227"/>
  <!-- 검날 빛 -->
  <line x1="32" y1="14" x2="32" y2="36" stroke="#fff" stroke-width="0.8" opacity="0.4"/>
  <!-- 별 장식 -->
  <circle cx="18" cy="18" r="1.5" fill="#4fc3f7" opacity="0.8"/>
  <circle cx="46" cy="22" r="1" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="44" cy="46" r="1.2" fill="#c9a227" opacity="0.7"/>
  <circle cx="20" cy="44" r="1" fill="#c9a227" opacity="0.5"/>
</svg>

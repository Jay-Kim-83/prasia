<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 배경: 밝은 그라데이션 -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e3a6e"/>
      <stop offset="100%" stop-color="#0f1f3d"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#5a9fff" stroke-width="2"/>
  <!-- 마법진 -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#ffd700" stroke-width="1.2" opacity="0.7"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#ffd700" stroke-width="0.6" opacity="0.3" stroke-dasharray="3 3"/>
  <!-- 포탈 링 -->
  <ellipse cx="32" cy="32" rx="14" ry="18" fill="none" stroke="#7ec8ff" stroke-width="1.5" opacity="0.7" transform="rotate(25 32 32)"/>
  <ellipse cx="32" cy="32" rx="14" ry="18" fill="none" stroke="#7ec8ff" stroke-width="1.5" opacity="0.5" transform="rotate(-25 32 32)"/>
  <!-- 검 -->
  <line x1="32" y1="10" x2="32" y2="44" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="12" x2="32" y2="34" stroke="#fff5b8" stroke-width="1" opacity="0.6"/>
  <!-- 가드 -->
  <line x1="23" y1="36" x2="41" y2="36" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 손잡이 -->
  <line x1="32" y1="36" x2="32" y2="50" stroke="#e6a800" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="32" cy="50" r="3" fill="#ffd700" stroke="#fff" stroke-width="0.5"/>
  <!-- 빛나는 별 -->
  <circle cx="16" cy="16" r="2" fill="#7ec8ff" opacity="0.9"/>
  <circle cx="48" cy="20" r="1.5" fill="#b8e0ff" opacity="0.8"/>
  <circle cx="46" cy="46" r="1.8" fill="#ffd700" opacity="0.8"/>
  <circle cx="18" cy="44" r="1.3" fill="#ffd700" opacity="0.7"/>
  <circle cx="32" cy="10" r="2" fill="#fff" opacity="0.6"/>
</svg>
